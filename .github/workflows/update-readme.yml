name: Update README

on:
  push:
    branches: [main]
    paths:
      - "Casks/**.rb"
      - "Formula/**.rb"
      - "scripts/update-readme.py"
      - ".github/workflows/update-readme.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate README tables
        run: python3 scripts/update-readme.py

      - name: Commit changes
        run: |
          if git diff --quiet -- README.md; then
            echo "README is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto-update README cask/formula tables"
          git push
